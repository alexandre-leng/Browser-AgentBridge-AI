<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Vision</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#e94560',
            dark: { DEFAULT: '#0a0a0a', 800: '#1a1a2e', 700: '#16213e', 600: '#0f3460' },
          }
        }
      }
    }
  </script>
  <style>
    #log { scrollbar-width: thin; scrollbar-color: #333 transparent; }
    #log::-webkit-scrollbar { width: 4px; }
    #log::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    .streaming { animation: pulse 1s infinite; }
    #mouseCursor {
      position: absolute;
      width: 20px; height: 20px;
      border: 2px solid #e94560;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: left .1s, top .1s;
      z-index: 100;
      box-shadow: 0 0 10px rgba(233,69,96,0.8);
    }
    .btn-green { @apply bg-green-500 text-dark font-bold hover:bg-green-400; }
    .btn-dark  { @apply bg-dark-700 text-gray-300 border border-gray-700 hover:bg-dark-600 hover:text-white; }
    .ctrl-btn  { @apply text-xs font-semibold px-2 py-2 rounded-md transition-colors min-h-[36px]; }
  </style>
</head>
<body class="h-full bg-dark text-gray-200 flex flex-col overflow-hidden">

  <!-- HEADER -->
  <header class="flex items-center justify-between px-3 sm:px-6 py-2 sm:py-3 bg-dark-800 border-b-2 border-brand shrink-0">
    <h1 class="text-base sm:text-lg font-bold text-brand">OpenClaw Vision</h1>
    <div class="flex items-center gap-2 sm:gap-3">
      <span id="statusText" class="text-xs text-gray-400">En attente...</span>
      <div id="statusDot" class="w-2.5 h-2.5 rounded-full bg-red-500 transition-all shrink-0"></div>
      <!-- Sidebar toggle on mobile -->
      <button id="sidebarToggle" onclick="toggleSidebar()"
              class="sm:hidden text-gray-500 border border-gray-700 px-2 py-1 rounded text-xs hover:text-brand hover:border-brand transition-colors">
        Info
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <div class="flex flex-1 overflow-hidden flex-col sm:flex-row">

    <!-- VIEWPORT -->
    <div id="viewport" class="flex-1 relative flex items-center justify-center bg-black overflow-hidden cursor-crosshair min-h-0">

      <!-- No signal -->
      <div id="noSignal" class="text-center text-gray-600 select-none px-4">
        <div class="text-5xl sm:text-6xl mb-3 sm:mb-4">📡</div>
        <p class="text-sm sm:text-base">En attente de flux vidéo...</p>
        <p class="text-xs mt-2 text-gray-700">Ouvrez un onglet Firefox et démarrez le stream</p>
      </div>

      <img id="streamImage" class="max-w-full max-h-full border border-gray-800 hidden">
      <div id="mouseCursor" style="display:none;"></div>

      <!-- FPS badge -->
      <div id="fpsCounter"
           class="absolute top-1.5 right-1.5 sm:top-2 sm:right-2 bg-black/70 text-gray-300 font-mono text-[10px] sm:text-xs px-2 py-0.5 sm:py-1 rounded">
        0 FPS
      </div>
    </div>

    <!-- SIDEBAR -->
    <aside id="sidebar"
           class="hidden sm:flex flex-col w-full sm:w-64 md:w-72 bg-dark-800 border-t sm:border-t-0 sm:border-l border-gray-800 shrink-0 max-h-60 sm:max-h-none">

      <!-- Controls -->
      <div class="p-3 sm:p-4 border-b border-gray-800">
        <p class="text-[10px] font-bold uppercase tracking-widest text-gray-600 mb-2 sm:mb-3">Contrôles</p>
        <div class="grid grid-cols-2 gap-1.5 sm:gap-2">
          <button id="startStream"    class="ctrl-btn btn-green">Démarrer</button>
          <button id="stopStream"     class="ctrl-btn btn-dark">Arrêter</button>
          <button id="takeScreenshot" class="ctrl-btn btn-dark">Capture</button>
          <button id="fullScreen"     class="ctrl-btn btn-dark">Plein écran</button>
        </div>
      </div>

      <!-- Info grid -->
      <div class="p-3 sm:p-4 border-b border-gray-800">
        <p class="text-[10px] font-bold uppercase tracking-widest text-gray-600 mb-2 sm:mb-3">Informations</p>
        <div class="grid grid-cols-2 gap-1.5 sm:gap-2 text-[10px] sm:text-xs">
          <div class="bg-dark-700 rounded p-1.5 sm:p-2">
            <p class="text-gray-600 text-[9px] sm:text-[10px] mb-0.5">URL</p>
            <p id="infoUrl" class="text-gray-200 font-medium truncate">-</p>
          </div>
          <div class="bg-dark-700 rounded p-1.5 sm:p-2">
            <p class="text-gray-600 text-[9px] sm:text-[10px] mb-0.5">Résolution</p>
            <p id="infoResolution" class="text-gray-200 font-medium">-</p>
          </div>
          <div class="bg-dark-700 rounded p-1.5 sm:p-2">
            <p class="text-gray-600 text-[9px] sm:text-[10px] mb-0.5">Scroll Y</p>
            <p id="infoScroll" class="text-gray-200 font-medium">-</p>
          </div>
          <div class="bg-dark-700 rounded p-1.5 sm:p-2">
            <p class="text-gray-600 text-[9px] sm:text-[10px] mb-0.5">Dernière image</p>
            <p id="infoTimestamp" class="text-gray-200 font-medium">-</p>
          </div>
        </div>
      </div>

      <!-- Log -->
      <div class="flex items-center justify-between px-3 sm:px-4 py-2 border-b border-gray-800">
        <span class="text-[10px] font-bold uppercase tracking-widest text-gray-600">Journal</span>
      </div>
      <div id="log" class="flex-1 overflow-y-auto p-2 font-mono text-[9px] sm:text-[10px]"></div>

    </aside>
  </div>

  <script>
    function toggleSidebar() {
      const s = document.getElementById('sidebar');
      s.classList.toggle('hidden');
      s.classList.toggle('flex');
    }
  </script>
  <script src="stream-viewer.js"></script>
</body>
</html>
