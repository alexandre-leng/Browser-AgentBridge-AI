<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenClaw Demo Shop</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #172033;
      }
      body {
        margin: 0;
      }
      header {
        background: #14213d;
        color: white;
        padding: 24px clamp(20px, 5vw, 64px);
      }
      main {
        display: grid;
        gap: 24px;
        max-width: 1040px;
        margin: 0 auto;
        padding: 28px clamp(16px, 4vw, 40px) 48px;
      }
      section {
        background: white;
        border: 1px solid #d9e1ef;
        border-radius: 8px;
        padding: 20px;
      }
      .products {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }
      article {
        border: 1px solid #d9e1ef;
        border-radius: 8px;
        padding: 16px;
      }
      label {
        display: grid;
        gap: 6px;
        margin: 10px 0;
        font-weight: 650;
      }
      input,
      select,
      button {
        font: inherit;
      }
      input,
      select {
        border: 1px solid #aeb9cb;
        border-radius: 6px;
        padding: 10px 12px;
      }
      button {
        border: 0;
        border-radius: 6px;
        background: #197278;
        color: white;
        cursor: pointer;
        padding: 10px 14px;
        font-weight: 750;
      }
      button.secondary {
        background: #33415c;
      }
      #result {
        border-left: 4px solid #197278;
        padding-left: 12px;
        min-height: 24px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>OpenClaw Demo Shop</h1>
      <p>Small deterministic site for agent browser testing.</p>
    </header>
    <main>
      <section aria-labelledby="products-title">
        <h2 id="products-title">Products</h2>
        <div class="products">
          <article data-product="starter">
            <h3>Starter Plan</h3>
            <p class="price">$19</p>
            <button type="button" data-plan="Starter Plan">Choose Starter</button>
          </article>
          <article data-product="pro">
            <h3>Pro Plan</h3>
            <p class="price">$49</p>
            <button type="button" data-plan="Pro Plan">Choose Pro</button>
          </article>
          <article data-product="enterprise">
            <h3>Enterprise Plan</h3>
            <p class="price">$149</p>
            <button type="button" data-plan="Enterprise Plan">Choose Enterprise</button>
          </article>
        </div>
      </section>

      <section aria-labelledby="checkout-title">
        <h2 id="checkout-title">Checkout</h2>
        <form id="checkout">
          <label>
            Name
            <input name="name" autocomplete="name" placeholder="Jane Builder" required />
          </label>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" placeholder="jane@example.com" required />
          </label>
          <label>
            Team size
            <select name="teamSize" required>
              <option value="">Select a size</option>
              <option value="solo">Solo</option>
              <option value="small">2-10</option>
              <option value="large">11+</option>
            </select>
          </label>
          <button type="submit">Submit order</button>
        </form>
        <p id="result" role="status" aria-live="polite"></p>
      </section>
    </main>
    <script>
      const state = { plan: "" };
      document.querySelectorAll("[data-plan]").forEach((button) => {
        button.addEventListener("click", () => {
          state.plan = button.dataset.plan;
          document.querySelector("#result").textContent = `${state.plan} selected`;
        });
      });
      document.querySelector("#checkout").addEventListener("submit", (event) => {
        event.preventDefault();
        const data = new FormData(event.currentTarget);
        const name = data.get("name");
        const email = data.get("email");
        const size = data.get("teamSize");
        document.querySelector("#result").textContent = `Order confirmed for ${name} (${email}) on ${state.plan || "no plan"} with ${size} team.`;
      });
    </script>
  </body>
</html>
