<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Bridge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#e94560',
            dark: { DEFAULT: '#0d0d1a', 800: '#1a1a2e', 700: '#16213e', 600: '#0f3460' },
          }
        }
      }
    }
  </script>
  <style>
    .btn-red   { @apply px-3 py-2 rounded-md text-xs font-semibold bg-brand text-white hover:bg-red-700 transition-colors min-h-[36px]; }
    .btn-dark  { @apply px-3 py-2 rounded-md text-xs font-semibold bg-dark-700 text-gray-300 border border-gray-700 hover:bg-dark-600 hover:text-white transition-colors min-h-[36px]; }
    .btn-green { @apply px-3 py-2 rounded-md text-xs font-semibold bg-green-500 text-dark font-bold hover:bg-green-400 transition-colors min-h-[36px]; }
    #log { scrollbar-width: thin; scrollbar-color: #333 transparent; }
    #log::-webkit-scrollbar { width: 4px; }
    #log::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body class="h-full bg-dark text-gray-200 flex flex-col overflow-hidden">

  <!-- HEADER -->
  <header class="flex items-center justify-between px-3 sm:px-6 py-2 sm:py-3 bg-dark-800 border-b-2 border-brand shrink-0 z-10 gap-2">
    <h1 class="text-base sm:text-lg font-bold text-brand tracking-wide shrink-0">OpenClaw Bridge</h1>
    <div class="flex items-center gap-2 sm:gap-4 text-xs sm:text-sm text-gray-400 flex-wrap justify-end">
      <!-- Status -->
      <div class="flex items-center gap-1.5 bg-dark-700 border border-gray-700 rounded-full px-2 sm:px-3 py-1">
        <span id="dot" class="w-2 h-2 rounded-full bg-red-500 transition-all shrink-0"></span>
        <span id="statusText" class="font-medium text-gray-300 text-xs">Déconnecté</span>
      </div>
      <!-- Clients -->
      <span class="hidden sm:inline">Clients : <strong id="clientCount" class="text-brand">0</strong></span>
      <!-- Viewer link -->
      <a href="/viewer" target="_blank"
         class="text-brand border border-brand px-2 sm:px-3 py-1 rounded text-xs hover:bg-brand hover:text-white transition-all whitespace-nowrap">
        Viewer
      </a>
      <!-- Log toggle on mobile -->
      <button id="logToggle" onclick="toggleLog()"
              class="md:hidden text-gray-500 border border-gray-700 px-2 py-1 rounded text-xs hover:text-brand hover:border-brand transition-colors">
        Journal
      </button>
    </div>
  </header>

  <!-- STATS BAR -->
  <div class="flex gap-3 sm:gap-6 px-3 sm:px-6 py-1.5 bg-dark-800 border-b border-gray-800 shrink-0 text-[10px] sm:text-xs text-gray-500 overflow-x-auto">
    <span class="whitespace-nowrap">Cmds : <strong id="cmdCount" class="text-brand">0</strong></span>
    <span class="whitespace-nowrap">Résultats : <strong id="resCount" class="text-green-400">0</strong></span>
    <span class="whitespace-nowrap">Frames : <strong id="frameCount" class="text-blue-400">0</strong></span>
    <span class="hidden sm:inline whitespace-nowrap">Clients : <strong id="clientCount2" class="text-brand">0</strong></span>
  </div>

  <!-- MAIN -->
  <main class="flex flex-1 overflow-hidden flex-col md:flex-row">

    <!-- PANELS GRID -->
    <div class="flex-1 p-3 sm:p-4 lg:p-5 grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 auto-rows-min overflow-y-auto">

      <!-- Recherche -->
      <div class="bg-dark-800 border border-gray-800 rounded-xl p-3 sm:p-4">
        <h3 class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-brand mb-2 sm:mb-3 pb-2 border-b border-gray-800">Recherche</h3>
        <input id="query" type="text" value="formateur IA marseille"
               class="w-full mb-2 sm:mb-3 px-3 py-2 bg-dark border border-gray-700 rounded-lg text-xs sm:text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-brand transition-colors">
        <div class="flex gap-1.5 sm:gap-2 flex-wrap">
          <button onclick="sendSearch('google')"     class="btn-red">Google</button>
          <button onclick="sendSearch('bing')"       class="btn-dark">Bing</button>
          <button onclick="sendSearch('duckduckgo')" class="btn-dark">DDG</button>
        </div>
      </div>

      <!-- Souris -->
      <div class="bg-dark-800 border border-gray-800 rounded-xl p-3 sm:p-4">
        <h3 class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-brand mb-2 sm:mb-3 pb-2 border-b border-gray-800">Contrôle Souris</h3>
        <div class="grid grid-cols-2 sm:flex gap-1.5 sm:gap-2 sm:flex-wrap">
          <button onclick="sendMouseMove()"  class="btn-dark">Déplacer</button>
          <button onclick="sendMouseClick()" class="btn-dark">Cliquer</button>
          <button onclick="sendScroll()"     class="btn-dark">Scroll</button>
          <button onclick="sendHover()"      class="btn-dark">Hover</button>
        </div>
      </div>

      <!-- Clavier -->
      <div class="bg-dark-800 border border-gray-800 rounded-xl p-3 sm:p-4">
        <h3 class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-brand mb-2 sm:mb-3 pb-2 border-b border-gray-800">Contrôle Clavier</h3>
        <input id="typeText" type="text" value="Bonjour OpenClaw"
               class="w-full mb-2 sm:mb-3 px-3 py-2 bg-dark border border-gray-700 rounded-lg text-xs sm:text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-brand transition-colors">
        <div class="grid grid-cols-2 sm:flex gap-1.5 sm:gap-2 sm:flex-wrap">
          <button onclick="sendType()"             class="btn-red">Taper</button>
          <button onclick="sendKeyPress('Enter')"  class="btn-dark">Enter</button>
          <button onclick="sendKeyPress('Tab')"    class="btn-dark">Tab</button>
          <button onclick="sendKeyPress('Escape')" class="btn-dark">Esc</button>
        </div>
      </div>

      <!-- Vision -->
      <div class="bg-dark-800 border border-gray-800 rounded-xl p-3 sm:p-4">
        <h3 class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-brand mb-2 sm:mb-3 pb-2 border-b border-gray-800">Vision & Stream</h3>
        <div class="grid grid-cols-2 sm:flex gap-1.5 sm:gap-2 sm:flex-wrap">
          <button onclick="sendVision('vision.start')"      class="btn-green">Démarrer</button>
          <button onclick="sendVision('vision.stop')"       class="btn-dark">Arrêter</button>
          <button onclick="sendVision('vision.screenshot')" class="btn-dark">Screenshot</button>
          <button onclick="sendHuman('human.read')"         class="btn-dark">Lire page</button>
        </div>
      </div>

      <!-- Navigation -->
      <div class="bg-dark-800 border border-gray-800 rounded-xl p-3 sm:p-4">
        <h3 class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-brand mb-2 sm:mb-3 pb-2 border-b border-gray-800">Navigation</h3>
        <div class="flex gap-1.5 sm:gap-2 flex-wrap">
          <button onclick="sendNavigate()"   class="btn-dark">google.com</button>
          <button onclick="sendExtract()"    class="btn-dark">Extraire</button>
          <button onclick="sendScreenshot()" class="btn-dark">Screenshot</button>
        </div>
      </div>

      <!-- Combo -->
      <div class="bg-dark-800 border border-gray-800 rounded-xl p-3 sm:p-4">
        <h3 class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-brand mb-2 sm:mb-3 pb-2 border-b border-gray-800">Combo Actions</h3>
        <div class="flex gap-1.5 sm:gap-2 flex-wrap">
          <button onclick="sendCombo('combo.searchAndClick')" class="btn-red">Recherche + Clic</button>
        </div>
      </div>

      <!-- Interaction DOM -->
      <div class="bg-dark-800 border border-brand/30 rounded-xl p-3 sm:p-4 sm:col-span-2">
        <h3 class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-brand mb-2 sm:mb-3 pb-2 border-b border-brand/20">🎯 Interaction DOM</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 sm:gap-3 mb-3">
          <div>
            <label class="text-[10px] text-gray-500 uppercase tracking-wider mb-1 block">Sélecteur CSS</label>
            <input id="domSelector" type="text" placeholder="button.submit, #login, a[href]..."
                   class="w-full px-3 py-2 bg-dark border border-gray-700 rounded-lg text-xs sm:text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-brand transition-colors">
          </div>
          <div>
            <label class="text-[10px] text-gray-500 uppercase tracking-wider mb-1 block">Texte visible</label>
            <input id="domText" type="text" placeholder="Accepter, Envoyer, Se connecter..."
                   class="w-full px-3 py-2 bg-dark border border-gray-700 rounded-lg text-xs sm:text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-brand transition-colors">
          </div>
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-1.5 sm:gap-2 mb-3">
          <button onclick="sendDomInspect()"   class="btn-green">🔍 Inspecter</button>
          <button onclick="sendDomClick()"     class="btn-red">👆 Cliquer</button>
          <button onclick="sendDomHover()"     class="btn-dark">🎯 Hover</button>
          <button onclick="sendDomType()"      class="btn-dark">⌨️ Taper</button>
        </div>
        <!-- Inspect results area -->
        <div id="domInspectResults" class="hidden bg-dark rounded-lg border border-gray-800 p-2 max-h-40 overflow-y-auto">
          <div class="flex items-center justify-between mb-1">
            <span class="text-[10px] text-gray-500 uppercase tracking-wider">Éléments trouvés</span>
            <button onclick="closeDomInspect()" class="text-[10px] text-gray-600 hover:text-brand">✕ Fermer</button>
          </div>
          <div id="domInspectList" class="font-mono text-[10px] sm:text-[11px] space-y-0.5"></div>
        </div>
      </div>

    </div>

    <!-- LOG SIDEBAR — hidden on mobile (toggle via button), visible md+ -->
    <aside id="logPanel"
           class="hidden md:flex flex-col w-full md:w-72 lg:w-80 bg-[#111120] border-t md:border-t-0 md:border-l border-gray-800 shrink-0 max-h-64 md:max-h-none">
      <div class="flex items-center justify-between px-3 sm:px-4 py-2 sm:py-3 border-b border-gray-800">
        <span class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-gray-600">Journal</span>
        <button onclick="clearLog()"
                class="text-[10px] sm:text-xs text-gray-600 border border-gray-700 px-2 py-0.5 rounded hover:text-brand hover:border-brand transition-colors">
          Effacer
        </button>
      </div>
      <div id="log" class="flex-1 overflow-y-auto p-2 sm:p-3 font-mono text-[10px] sm:text-[11px]"></div>
    </aside>

  </main>

  <script>
    function toggleLog() {
      const panel = document.getElementById('logPanel');
      panel.classList.toggle('hidden');
      panel.classList.toggle('flex');
    }
    // Sync second client count display
    setInterval(() => {
      const v = document.getElementById('clientCount').textContent;
      document.getElementById('clientCount2').textContent = v;
    }, 2000);
  </script>
  <script src="dashboard.js"></script>
</body>
</html>
