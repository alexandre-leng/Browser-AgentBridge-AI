<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Bridge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 380px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 20px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #16213e;
    }
    
    .header h1 {
      font-size: 20px;
      color: #e94560;
      margin-bottom: 5px;
    }
    
    .header .subtitle {
      font-size: 12px;
      color: #888;
    }
    
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
      padding: 10px;
      background: #16213e;
      border-radius: 8px;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff4757;
      animation: pulse 2s infinite;
    }
    
    .status-dot.connected {
      background: #2ed573;
      animation: none;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .status-text {
      font-size: 14px;
    }
    
    .section {
      margin-bottom: 20px;
    }
    
    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 10px;
    }
    
    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    
    .btn {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }
    
    .btn-primary {
      background: #e94560;
      color: white;
    }
    
    .btn-primary:hover {
      background: #c73e54;
    }
    
    .btn-secondary {
      background: #16213e;
      color: #eee;
      border: 1px solid #0f3460;
    }
    
    .btn-secondary:hover {
      background: #0f3460;
    }
    
    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
    }
    
    .search-input {
      flex: 1;
      padding: 10px;
      border: 1px solid #16213e;
      border-radius: 6px;
      background: #16213e;
      color: #eee;
      font-size: 14px;
    }
    
    .search-input:focus {
      outline: none;
      border-color: #e94560;
    }
    
    .search-input::placeholder {
      color: #666;
    }
    
    .capabilities {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    
    .capability {
      padding: 4px 10px;
      background: #16213e;
      border-radius: 12px;
      font-size: 11px;
      color: #aaa;
      border: 1px solid #0f3460;
    }
    
    .capability.active {
      background: #0f3460;
      color: #2ed573;
      border-color: #2ed573;
    }
    
    .log {
      max-height: 120px;
      overflow-y: auto;
      background: #16213e;
      border-radius: 6px;
      padding: 10px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #aaa;
    }
    
    .log-entry {
      margin-bottom: 4px;
      padding: 2px 0;
      border-bottom: 1px solid #1a1a2e;
    }
    
    .log-entry:last-child {
      border-bottom: none;
    }
    
    .log-time {
      color: #e94560;
    }
    
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }
    
    .stat-box {
      background: #16213e;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 20px;
      font-weight: bold;
      color: #e94560;
    }
    
    .stat-label {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🦾 OpenClaw Bridge</h1>
    <div class="subtitle">Navigateur augmenté par IA</div>
  </div>
  
  <div class="status" id="status">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Connexion...</span>
  </div>
  
  <div class="section">
    <div class="section-title">Recherche Rapide</div>
    <div class="search-box">
      <input type="text" class="search-input" id="searchInput" placeholder="Entrez votre recherche...">
      <button class="btn btn-primary" id="searchBtn">🔍</button>
    </div>
  </div>
  
  <div class="section">
    <div class="section-title">Actions Rapides</div>
    <div class="quick-actions">
      <button class="btn btn-secondary" id="screenshotBtn">📸 Screenshot</button>
      <button class="btn btn-secondary" id="extractBtn">📋 Extraire</button>
      <button class="btn btn-secondary" id="googleBtn">🔍 Google</button>
      <button class="btn btn-secondary" id="bingBtn">🔍 Bing</button>
    </div>
  </div>
  
  <div class="section">
    <div class="section-title">Capacités</div>
    <div class="capabilities" id="capabilities">
      <span class="capability">Search</span>
      <span class="capability">Extract</span>
      <span class="capability">Navigate</span>
      <span class="capability">Screenshot</span>
      <span class="capability">Forms</span>
      <span class="capability">Download</span>
    </div>
  </div>
  
  <div class="stats">
    <div class="stat-box">
      <div class="stat-value" id="searchCount">0</div>
      <div class="stat-label">Recherches</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="tabCount">0</div>
      <div class="stat-label">Onglets</div>
    </div>
  </div>
  
  <div class="section" style="margin-top: 15px;">
    <div class="section-title">Journal</div>
    <div class="log" id="log">
      <div class="log-entry">
        <span class="log-time">[14:31]</span> Extension initialisée
      </div>
    </div>
  </div>

  <script src="browser-polyfill.js"></script>
  <script src="popup.js"></script>
</body>
</html>
